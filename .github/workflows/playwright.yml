name: Playwright CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Setup Python
      uses: actions/setup-python@v5  
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt   # ❗ FIXED (was requirement.txt)
        pip install behave
        python -m playwright install

    
    - name: Create state.zip
      shell: powershell
      run: |
        [System.IO.File]::WriteAllBytes("state.zip", [System.Convert]::FromBase64String("${{ secrets.STATE_JSON }}"))

    
    - name: Extract state.json
      shell: powershell
      run: |
        Expand-Archive -Path state.zip -DestinationPath . -Force

    - name: Verify state.json exists
      run: dir state.json

    
    - name: Run tests
      run: python -m behave --tags ~@skip_ci

    - name: Upload screenshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshot
        path: debug.png
        if-no-files-found: ignore