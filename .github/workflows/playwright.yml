name: Playwright CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted

    steps:
    # 🔥 Step 1: Clean workspace
    - name: Clean workspace
      shell: cmd
      run: |
        echo Cleaning...
        rmdir /s /q PlaywrightPythonAWH 2>nul

    # 🔥 Step 2: Clone repo manually (NO checkout action)
    - name: Clone repository
      shell: cmd
      run: |
        git clone https://github.com/Ashwini-ashu123/PlaywrightPythonAWH.git
        cd PlaywrightPythonAWH

    # 🔹 Step 3: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🔹 Step 4: Install dependencies
    - name: Install dependencies
      shell: cmd
      run: |
        cd PlaywrightPythonAWH
        pip install -r requirement.txt
        pip install behave
        python -m playwright install

    # 🔹 Step 5: Run tests
    - name: Run tests
      shell: cmd
      run: |
        cd PlaywrightPythonAWH
        python -m behave

    # 🔹 Step 6: Upload screenshots
    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: failure-screenshots
        path: PlaywrightPythonAWH/screenshots/
        if-no-files-found: ignore